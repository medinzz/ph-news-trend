name: Run News Crawler

on:
  # ── Scheduled: runs automatically every day at 01:00 UTC ─────────────────
  # (01:00 UTC = 09:00 PHT, so yesterday's PH articles are fully published)
  schedule:
    - cron: '0 1 * * *'

  # ── Manual: trigger from GitHub UI with optional date override ────────────
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD). Leave blank to use DB skip logic.'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYY-MM-DD). Leave blank to use today.'
        required: false
        default: ''

jobs:
  crawl:
    name: Crawl Inquirer Articles
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc g++ libxml2-dev libxslt-dev libffi-dev libssl-dev curl \
            libgtk-3-0 libdbus-glib-1-2 libxt6 libx11-xcb1 libxcb1 \
            libxcomposite1 libxcursor1 libxdamage1 libxfixes3 libxi6 \
            libxrandr2 libxrender1 libxss1 libxtst6 \
            libasound2t64 \
            libpangocairo-1.0-0 libatk1.0-0 libcairo-gobject2 libgdk-pixbuf-2.0-0

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Resolve crawl dates
        id: dates
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"

          if [ -z "$START" ]; then
            START=$(date -d "yesterday" +%Y-%m-%d)
          fi
          if [ -z "$END" ]; then
            END=$(date +%Y-%m-%d)
          fi

          echo "start_date=$START" >> $GITHUB_OUTPUT
          echo "end_date=$END"     >> $GITHUB_OUTPUT
          echo "Crawl range: $START → $END"

      - name: Run crawler
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DB:    ${{ secrets.MOTHERDUCK_DB }}
          TABLE_NAME:       ${{ secrets.TABLE_NAME }}
          STORAGE_BACKEND:  motherduck
          CRAWL_START_DATE: ${{ steps.dates.outputs.start_date }}
          CRAWL_END_DATE:   ${{ steps.dates.outputs.end_date }}
        run: python main.py --use-crawler

      - name: Report outcome
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Crawl completed successfully."
          else
            echo "❌ Crawl failed. Check logs above."
          fi